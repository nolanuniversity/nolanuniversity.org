<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPal Payment | Nolan University</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0A1C3A 0%, #1A2D4D 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .payment-container { background: white; border-radius: 24px; padding: 40px; max-width: 450px; width: 100%; text-align: center; }
        .paypal-btn { background: #0070BA; color: white; padding: 16px; border-radius: 12px; border: none; font-weight: 700; width: 100%; cursor: pointer; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="payment-container">
        <i class="fab fa-paypal" style="font-size: 64px; color: #0070BA;"></i>
        <h1>PayPal Payment</h1>
        <div class="amount" style="font-size: 32px; font-weight: 700; margin: 20px 0;" id="amountDisplay">$25 USD</div>
        <p>Pay securely with your PayPal account</p>
        <button class="paypal-btn" id="paypalBtn"><i class="fab fa-paypal"></i> Pay with PayPal</button>
        <button class="btn" id="cancelBtn" style="background: #0A1C3A; color: white; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; margin-top: 12px;">Cancel</button>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const amount = urlParams.get('amount') || '25';
        const currency = urlParams.get('currency') || 'USD';
        document.getElementById('amountDisplay').innerText = currency === 'ZMW' ? `ZK${amount}` : `$${amount}`;
        document.getElementById('paypalBtn').onclick = () => { window.open('https://www.paypal.com/send?business=nolanuniversity@example.com&amount=' + amount + '&currency_code=' + currency, '_blank'); setTimeout(() => { if(confirm('After completing payment, click OK to continue')) { localStorage.setItem('applicationFeePaid', 'true'); window.location.href = '../index.html?payment=success'; } }, 5000); };
        document.getElementById('cancelBtn').onclick = () => window.location.href = '../index.html';
    </script>
</body>
</html>
