<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Payment | Nolan University</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0A1C3A 0%, #1A2D4D 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .payment-container { background: white; border-radius: 24px; padding: 40px; max-width: 480px; width: 100%; }
        .card-element { border: 1px solid #E0E0E0; border-radius: 12px; padding: 16px; margin: 20px 0; background: #F5F5F5; }
        .btn { width: 100%; padding: 16px; background: #C5A028; color: #0A1C3A; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="payment-container">
        <h1>💳 Card Payment</h1>
        <div class="amount" style="font-size: 28px; font-weight: 700; color: #C5A028; margin: 20px 0;" id="amountDisplay">$25 USD</div>
        <div class="card-element">
            <div><i class="fab fa-cc-visa"></i> <i class="fab fa-cc-mastercard"></i> <i class="fab fa-cc-amex"></i></div>
            <input type="text" placeholder="Card Number" style="width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #E0E0E0; border-radius: 8px;">
            <div style="display: flex; gap: 10px;"><input type="text" placeholder="MM/YY" style="flex:1; padding: 12px; border: 1px solid #E0E0E0; border-radius: 8px;"><input type="text" placeholder="CVC" style="flex:1; padding: 12px; border: 1px solid #E0E0E0; border-radius: 8px;"></div>
            <input type="text" placeholder="Cardholder Name" style="width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #E0E0E0; border-radius: 8px;">
        </div>
        <button class="btn" id="payBtn">Pay Now</button>
        <button class="btn" id="cancelBtn" style="background: #0A1C3A; color: white; margin-top: 12px;">Cancel</button>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const amount = urlParams.get('amount') || '25';
        const currency = urlParams.get('currency') || 'USD';
        document.getElementById('amountDisplay').innerText = currency === 'ZMW' ? `ZK${amount}` : `$${amount}`;
        document.getElementById('payBtn').onclick = () => { alert('Payment processed successfully!'); localStorage.setItem('applicationFeePaid', 'true'); window.location.href = '../index.html?payment=success'; };
        document.getElementById('cancelBtn').onclick = () => window.location.href = '../index.html';
    </script>
</body>
</html>
