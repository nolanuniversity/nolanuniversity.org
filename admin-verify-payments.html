<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Verify Payments | Nolan University</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F5F5F5; padding: 40px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: #0A1C3A; color: white; padding: 20px; border-radius: 16px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-number { font-size: 36px; font-weight: 800; color: #C5A028; }
        .payment-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 4px solid #FFC107; }
        .payment-card.approved { border-left-color: #28A745; }
        .payment-card.rejected { border-left-color: #DC3545; }
        .payment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .reference { font-family: monospace; font-size: 18px; font-weight: 700; color: #0A1C3A; }
        .status { padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; }
        .status-pending { background: #FFF3CD; color: #856404; }
        .status-approved { background: #D4EDDA; color: #155724; }
        .status-rejected { background: #F8D7DA; color: #721C24; }
        .payment-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 16px 0; padding: 16px; background: #F5F5F5; border-radius: 12px; }
        .actions { display: flex; gap: 12px; margin-top: 16px; }
        .btn-approve { background: #28A745; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-reject { background: #DC3545; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-view { background: #0A1C3A; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .empty-state { text-align: center; padding: 60px; color: #666; }
        .search-box { display: flex; gap: 12px; margin-bottom: 24px; }
        .search-box input { flex: 1; padding: 12px; border: 1px solid #E0E0E0; border-radius: 8px; }
        .filter-buttons { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 20px; border: none; border-radius: 50px; cursor: pointer; background: #E0E0E0; }
        .filter-btn.active { background: #0A1C3A; color: white; }
        @media (max-width: 768px) { .stats { grid-template-columns: repeat(2, 1fr); } .payment-details { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-shield-alt"></i> Payment Verification Dashboard</h1>
            <div><i class="fas fa-user-shield"></i> Admin</div>
        </div>
        
        <div class="stats" id="stats">
            <div class="stat-card"><div class="stat-number" id="pendingCount">0</div><div>Pending</div></div>
            <div class="stat-card"><div class="stat-number" id="approvedCount">0</div><div>Approved</div></div>
            <div class="stat-card"><div class="stat-number" id="rejectedCount">0</div><div>Rejected</div></div>
            <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div>Total</div></div>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by reference, name, or email...">
        </div>
        
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="approved">Approved</button>
            <button class="filter-btn" data-filter="rejected">Rejected</button>
        </div>
        
        <div id="paymentsList"></div>
    </div>

    <script>
        let payments = [];
        let currentFilter = 'all';
        let searchQuery = '';
        
        function loadPayments() {
            const stored = localStorage.getItem('pendingVerifications');
            payments = stored ? JSON.parse(stored) : [];
            updateStats();
            renderPayments();
        }
        
        function updateStats() {
            document.getElementById('pendingCount').innerText = payments.filter(p => p.status === 'pending').length;
            document.getElementById('approvedCount').innerText = payments.filter(p => p.status === 'approved').length;
            document.getElementById('rejectedCount').innerText = payments.filter(p => p.status === 'rejected').length;
            document.getElementById('totalCount').innerText = payments.length;
        }
        
        function renderPayments() {
            let filtered = payments;
            if (currentFilter !== 'all') filtered = filtered.filter(p => p.status === currentFilter);
            if (searchQuery) filtered = filtered.filter(p => p.referenceCode.toLowerCase().includes(searchQuery) || p.applicantName.toLowerCase().includes(searchQuery) || p.applicantEmail.toLowerCase().includes(searchQuery));
            
            const container = document.getElementById('paymentsList');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 16px;"></i><p>No payment verifications found</p></div>';
                return;
            }
            
            container.innerHTML = filtered.map(payment => `
                <div class="payment-card ${payment.status}">
                    <div class="payment-header">
                        <span class="reference"><i class="fas fa-hashtag"></i> ${payment.referenceCode}</span>
                        <span class="status status-${payment.status}">${payment.status.toUpperCase()}</span>
                    </div>
                    <div class="payment-details">
                        <div><strong>Applicant:</strong><br>${payment.applicantName}</div>
                        <div><strong>Email:</strong><br>${payment.applicantEmail}</div>
                        <div><strong>Phone:</strong><br>${payment.applicantPhone || 'Not provided'}</div>
                        <div><strong>Amount:</strong><br>${payment.currency === 'ZMW' ? 'ZK' : '$'}${payment.amount}</div>
                        <div><strong>Method:</strong><br>${payment.paymentMethod}</div>
                        <div><strong>Submitted:</strong><br>${new Date(payment.timestamp).toLocaleString()}</div>
                    </div>
                    ${payment.status === 'pending' ? `
                        <div class="actions">
                            <button class="btn-approve" onclick="verifyPayment('${payment.referenceCode}', 'approved')"><i class="fas fa-check"></i> Approve</button>
                            <button class="btn-reject" onclick="verifyPayment('${payment.referenceCode}', 'rejected')"><i class="fas fa-times"></i> Reject</button>
                        </div>
                    ` : `
                        <div class="actions">
                            <button class="btn-view" onclick="viewDetails('${payment.referenceCode}')"><i class="fas fa-eye"></i> View Details</button>
                        </div>
                    `}
                </div>
            `).join('');
        }
        
        function verifyPayment(referenceCode, status) {
            const payment = payments.find(p => p.referenceCode === referenceCode);
            if (payment) {
                payment.status = status;
                payment.verifiedAt = new Date().toISOString();
                localStorage.setItem('pendingVerifications', JSON.stringify(payments));
                
                // Store that this payment is verified
                localStorage.setItem(`verified_${referenceCode}`, status);
                
                // In real implementation, send email to applicant
                console.log(`Email sent to ${payment.applicantEmail}: Your payment has been ${status}`);
                
                updateStats();
                renderPayments();
                
                alert(`Payment ${status}! Applicant will be notified.`);
            }
        }
        
        function viewDetails(referenceCode) {
            const payment = payments.find(p => p.referenceCode === referenceCode);
            alert(`Reference: ${payment.referenceCode}\nApplicant: ${payment.applicantName}\nEmail: ${payment.applicantEmail}\nAmount: ${payment.currency === 'ZMW' ? 'ZK' : '$'}${payment.amount}\nStatus: ${payment.status}\nSubmitted: ${new Date(payment.timestamp).toLocaleString()}`);
        }
        
        // Search and filter
        document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value.toLowerCase(); renderPayments(); });
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderPayments();
            });
        });
        
        loadPayments();
    </script>
</body>
  </html>
