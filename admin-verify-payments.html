<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Nolan University</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F5F5F5; }
        
        .header { background: #0A1C3A; color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .header h1 { font-size: 24px; }
        .admin-info { display: flex; align-items: center; gap: 20px; }
        .admin-badge { background: #C5A028; color: #0A1C3A; padding: 6px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; }
        .logout-btn { background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .logout-btn:hover { background: rgba(255,255,255,0.3); }
        
        .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; padding: 30px; max-width: 1600px; margin: 0 auto; }
        .stat-card { background: white; padding: 24px; border-radius: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-4px); }
        .stat-number { font-size: 36px; font-weight: 800; color: #C5A028; }
        .stat-label { color: #666; margin-top: 8px; font-size: 14px; }
        
        .controls { max-width: 1600px; margin: 0 auto 20px; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .search-box input { padding: 12px 16px; width: 300px; border: 1px solid #E0E0E0; border-radius: 12px; font-size: 14px; }
        .filter-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 20px; border: none; border-radius: 50px; cursor: pointer; background: #E0E0E0; font-weight: 500; transition: all 0.3s; }
        .filter-btn.active { background: #0A1C3A; color: white; }
        .export-btn { background: #28A745; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        
        .payments-list { max-width: 1600px; margin: 0 auto; padding: 0 30px 40px; }
        .payment-card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 4px solid #FFC107; transition: all 0.3s; }
        .payment-card.approved { border-left-color: #28A745; }
        .payment-card.rejected { border-left-color: #DC3545; opacity: 0.8; }
        .payment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .reference { font-family: monospace; font-size: 18px; font-weight: 700; color: #0A1C3A; background: #F5F5F5; padding: 6px 14px; border-radius: 8px; }
        .status { padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; }
        .status-pending { background: #FFF3CD; color: #856404; }
        .status-approved { background: #D4EDDA; color: #155724; }
        .status-rejected { background: #F8D7DA; color: #721C24; }
        .payment-details { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin: 16px 0; padding: 16px; background: #F8F9FA; border-radius: 12px; }
        .detail-item { display: flex; flex-direction: column; gap: 4px; }
        .detail-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .detail-value { font-weight: 600; color: #333; font-size: 14px; }
        .actions { display: flex; gap: 12px; margin-top: 16px; }
        .btn-approve { background: #28A745; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-approve:hover { background: #218838; transform: translateY(-2px); }
        .btn-reject { background: #DC3545; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-reject:hover { background: #C82333; transform: translateY(-2px); }
        .btn-view { background: #0A1C3A; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-view:hover { background: #1A2D4D; }
        .empty-state { text-align: center; padding: 60px; color: #666; background: white; border-radius: 16px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 16px; max-width: 500px; width: 90%; padding: 24px; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; justify-content: flex-end; }
        
        .toast { position: fixed; bottom: 30px; right: 30px; background: #28A745; color: white; padding: 12px 24px; border-radius: 8px; z-index: 1001; display: none; animation: slideIn 0.3s ease; }
        .toast.error { background: #DC3545; }
        .toast.show { display: block; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        @media (max-width: 1024px) { .stats { grid-template-columns: repeat(3, 1fr); } .payment-details { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .stats { grid-template-columns: repeat(2, 1fr); padding: 20px; } .payment-details { grid-template-columns: 1fr; } .controls { flex-direction: column; align-items: stretch; padding: 0 20px; } .search-box input { width: 100%; } .payments-list { padding: 0 20px 20px; } }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1><i class="fas fa-shield-alt"></i> Payment Verification Dashboard</h1>
            <p style="font-size: 13px; opacity: 0.8; margin-top: 4px;">Nolan University - Central Application System</p>
        </div>
        <div class="admin-info">
            <span class="admin-badge"><i class="fas fa-user-shield"></i> <span id="adminEmailDisplay"></span></span>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>
    
    <div class="stats" id="stats">
        <div class="stat-card"><div class="stat-number" id="pendingCount">0</div><div class="stat-label">Pending</div></div>
        <div class="stat-card"><div class="stat-number" id="approvedCount">0</div><div class="stat-label">Approved</div></div>
        <div class="stat-card"><div class="stat-number" id="rejectedCount">0</div><div class="stat-label">Rejected</div></div>
        <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div class="stat-label">Total Applications</div></div>
        <div class="stat-card"><div class="stat-number" id="totalAmount">0</div><div class="stat-label">Total Fees (ZK)</div></div>
    </div>
    
    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Search by reference, name, or email...">
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="approved">Approved</button>
            <button class="filter-btn" data-filter="rejected">Rejected</button>
        </div>
        <button class="export-btn" onclick="exportData()"><i class="fas fa-download"></i> Export Report</button>
    </div>
    
    <div class="payments-list" id="paymentsList"></div>
    
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Confirm Action</h3>
            <p id="modalMessage"></p>
            <div class="modal-buttons">
                <button class="btn-reject" onclick="closeModal()">Cancel</button>
                <button class="btn-approve" id="confirmActionBtn">Confirm</button>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>

    <script>
        // ========================================
        // EMAILJS CONFIGURATION - REPLACE WITH YOUR ACTUAL KEYS
        // ========================================
        const EMAILJS_CONFIG = {
            PUBLIC_KEY: '1GuyWccqX6p3b2_9T',      // Replace with your EmailJS public key
            SERVICE_ID: 'service_nolan_university',      // Replace with your EmailJS service ID
            TEMPLATE_APPROVED: 'template_payment_approved', // Template for approval email
            TEMPLATE_REJECTED: 'template_payment_rejected'  // Template for rejection email
        };
        
        // Initialize EmailJS
        emailjs.init(EMAILJS_CONFIG.PUBLIC_KEY);
        
        // Check authentication with debug
(function checkAuth() {
    const isLoggedIn = sessionStorage.getItem('adminLoggedIn');
    console.log('Auth check - adminLoggedIn:', isLoggedIn);
    
    if (isLoggedIn !== 'true') {
        console.log('Not logged in, redirecting to index.html');
        window.location.replace('index.html');
        return false;
    }
    
    console.log('Authentication successful');
    return true;
     })();
        
        // Display admin email
        document.getElementById('adminEmailDisplay').innerText = sessionStorage.getItem('adminEmail') || 'Admin';
        
        let allPayments = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let pendingAction = null;
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            if (isError) toast.classList.add('error');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }
        
        // Send real email notification to applicant
        async function sendEmailNotification(payment, status) {
            const templateParams = {
                to_email: payment.applicantEmail,
                applicant_name: payment.applicantName,
                reference_code: payment.referenceCode,
                amount: `${payment.currency === 'ZMW' ? 'ZK' : '$'}${payment.amount}`,
                payment_method: payment.paymentMethod,
                verified_date: new Date().toLocaleString(),
                verified_by: sessionStorage.getItem('adminEmail') || 'Admin',
                application_link: 'https://nolanuniversity.org/apply/'
            };
            
            const templateId = status === 'approved' ? EMAILJS_CONFIG.TEMPLATE_APPROVED : EMAILJS_CONFIG.TEMPLATE_REJECTED;
            
            try {
                await emailjs.send(EMAILJS_CONFIG.SERVICE_ID, templateId, templateParams);
                console.log(`${status.toUpperCase()} email sent to ${payment.applicantEmail}`);
                return true;
            } catch (error) {
                console.error('Failed to send email:', error);
                return false;
            }
        }
        
        // Load payments from localStorage
        function loadPayments() {
            const stored = localStorage.getItem('pendingVerifications');
            allPayments = stored ? JSON.parse(stored) : [];
            updateStats();
            renderPayments();
        }
        
        function updateStats() {
            const pending = allPayments.filter(p => p.status === 'pending').length;
            const approved = allPayments.filter(p => p.status === 'approved').length;
            const rejected = allPayments.filter(p => p.status === 'rejected').length;
            const total = allPayments.length;
            const totalAmount = allPayments.filter(p => p.status === 'approved').reduce((sum, p) => sum + parseFloat(p.amount || 0), 0);
            
            document.getElementById('pendingCount').innerText = pending;
            document.getElementById('approvedCount').innerText = approved;
            document.getElementById('rejectedCount').innerText = rejected;
            document.getElementById('totalCount').innerText = total;
            document.getElementById('totalAmount').innerText = totalAmount.toLocaleString();
        }
        
        function renderPayments() {
            let filtered = allPayments;
            if (currentFilter !== 'all') filtered = filtered.filter(p => p.status === currentFilter);
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filtered = filtered.filter(p => 
                    p.referenceCode.toLowerCase().includes(query) ||
                    p.applicantName.toLowerCase().includes(query) ||
                    p.applicantEmail.toLowerCase().includes(query)
                );
            }
            
            const container = document.getElementById('paymentsList');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 16px;"></i><p>No payment submissions found</p></div>';
                return;
            }
            
            container.innerHTML = filtered.map(payment => `
                <div class="payment-card ${payment.status}">
                    <div class="payment-header">
                        <span class="reference"><i class="fas fa-hashtag"></i> ${payment.referenceCode}</span>
                        <span class="status status-${payment.status}">${payment.status.toUpperCase()}</span>
                    </div>
                    <div class="payment-details">
                        <div class="detail-item"><span class="detail-label">Applicant</span><span class="detail-value">${escapeHtml(payment.applicantName)}</span></div>
                        <div class="detail-item"><span class="detail-label">Email</span><span class="detail-value">${escapeHtml(payment.applicantEmail)}</span></div>
                        <div class="detail-item"><span class="detail-label">Phone</span><span class="detail-value">${payment.applicantPhone || 'N/A'}</span></div>
                        <div class="detail-item"><span class="detail-label">Amount</span><span class="detail-value">${payment.currency === 'ZMW' ? 'ZK' : '$'}${payment.amount}</span></div>
                        <div class="detail-item"><span class="detail-label">Method</span><span class="detail-value">${payment.paymentMethod}</span></div>
                        <div class="detail-item"><span class="detail-label">Submitted</span><span class="detail-value">${new Date(payment.timestamp).toLocaleString()}</span></div>
                    </div>
                    ${payment.status === 'pending' ? `
                        <div class="actions">
                            <button class="btn-approve" onclick="openConfirmModal('${payment.referenceCode}', 'approve')"><i class="fas fa-check"></i> Approve Payment</button>
                            <button class="btn-reject" onclick="openConfirmModal('${payment.referenceCode}', 'reject')"><i class="fas fa-times"></i> Reject Payment</button>
                        </div>
                    ` : `
                        <div class="actions">
                            <button class="btn-view" onclick="viewDetails('${payment.referenceCode}')"><i class="fas fa-eye"></i> View Details</button>
                        </div>
                        <div style="margin-top: 12px; font-size: 12px; color: #666;">
                            ${payment.status === 'approved' ? '✓ Verified' : '✗ Rejected'} on ${new Date(payment.verifiedAt).toLocaleString()}
                        </div>
                    `}
                </div>
            `).join('');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function openConfirmModal(referenceCode, action) {
            const payment = allPayments.find(p => p.referenceCode === referenceCode);
            if (!payment) return;
            
            pendingAction = { referenceCode, action, payment };
            const modal = document.getElementById('confirmModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalMessage = document.getElementById('modalMessage');
            const confirmBtn = document.getElementById('confirmActionBtn');
            
            if (action === 'approve') {
                modalTitle.innerHTML = '<i class="fas fa-check-circle"></i> Approve Payment';
                modalMessage.innerHTML = `Confirm APPROVAL for:<br><br>
                    <strong>${payment.applicantName}</strong><br>
                    Reference: ${payment.referenceCode}<br>
                    Amount: ${payment.currency === 'ZMW' ? 'ZK' : '$'}${payment.amount}<br><br>
                    An email will be sent to the applicant.`;
                confirmBtn.className = 'btn-approve';
                confirmBtn.innerHTML = '<i class="fas fa-check"></i> Approve';
            } else {
                modalTitle.innerHTML = '<i class="fas fa-times-circle"></i> Reject Payment';
                modalMessage.innerHTML = `Confirm REJECTION for:<br><br>
                    <strong>${payment.applicantName}</strong><br>
                    Reference: ${payment.referenceCode}<br>
                    Amount: ${payment.currency === 'ZMW' ? 'ZK' : '$'}${payment.amount}<br><br>
                    An email will be sent to the applicant.`;
                confirmBtn.className = 'btn-reject';
                confirmBtn.innerHTML = '<i class="fas fa-times"></i> Reject';
            }
            modal.classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('confirmModal').classList.remove('active');
            pendingAction = null;
        }
        
        document.getElementById('confirmActionBtn').addEventListener('click', async () => {
            if (pendingAction) {
                await processVerification(pendingAction.referenceCode, pendingAction.action);
                closeModal();
            }
        });
        
        async function processVerification(referenceCode, status) {
            const payment = allPayments.find(p => p.referenceCode === referenceCode);
            if (payment) {
                payment.status = status;
                payment.verifiedAt = new Date().toISOString();
                payment.verifiedBy = sessionStorage.getItem('adminEmail') || 'Admin';
                
                localStorage.setItem('pendingVerifications', JSON.stringify(allPayments));
                localStorage.setItem(`verified_${referenceCode}`, status);
                
                if (status === 'approved') {
                    localStorage.setItem(`applicationFeePaid_${referenceCode}`, 'true');
                }
                
                // Send real email notification
                showToast(`Sending ${status} email to ${payment.applicantEmail}...`);
                const emailSent = await sendEmailNotification(payment, status);
                
                if (emailSent) {
                    showToast(`Payment ${status.toUpperCase()}! Email sent to applicant.`);
                } else {
                    showToast(`Payment ${status.toUpperCase()}! But email failed to send.`, true);
                }
                
                // Log to audit
                const auditLog = JSON.parse(localStorage.getItem('adminAuditLog') || '[]');
                auditLog.unshift({
                    action: status,
                    referenceCode: referenceCode,
                    applicantName: payment.applicantName,
                    admin: sessionStorage.getItem('adminEmail'),
                    timestamp: new Date().toISOString(),
                    emailSent: emailSent
                });
                localStorage.setItem('adminAuditLog', JSON.stringify(auditLog.slice(0, 100)));
                
                updateStats();
                renderPayments();
            }
        }
        
        function viewDetails(referenceCode) {
            const payment = allPayments.find(p => p.referenceCode === referenceCode);
            if (payment) {
                alert(`📋 PAYMENT DETAILS\n\nReference: ${payment.referenceCode}\nApplicant: ${payment.applicantName}\nEmail: ${payment.applicantEmail}\nAmount: ${payment.currency === 'ZMW' ? 'ZK' : '$'}${payment.amount}\nMethod: ${payment.paymentMethod}\nStatus: ${payment.status}\nSubmitted: ${new Date(payment.timestamp).toLocaleString()}`);
            }
        }
        
        function exportData() {
            const data = allPayments.map(p => ({
                Reference: p.referenceCode,
                Applicant: p.applicantName,
                Email: p.applicantEmail,
                Phone: p.applicantPhone,
                Amount: `${p.currency === 'ZMW' ? 'ZK' : '$'}${p.amount}`,
                Method: p.paymentMethod,
                Status: p.status,
                Submitted: new Date(p.timestamp).toLocaleString(),
                Verified: p.verifiedAt ? new Date(p.verifiedAt).toLocaleString() : 'Pending'
            }));
            
            const headers = ['Reference', 'Applicant', 'Email', 'Phone', 'Amount', 'Method', 'Status', 'Submitted', 'Verified'];
            const rows = [headers.join(',')];
            data.forEach(item => {
                const values = headers.map(h => `"${(item[h] || '').replace(/"/g, '""')}"`);
                rows.push(values.join(','));
            });
            
            const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `payments_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderPayments();
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderPayments();
            });
        });
        
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            sessionStorage.removeItem('adminEmail');
            window.location.href = 'index.html';
        }
        
        loadPayments();
        setInterval(loadPayments, 30000);
    </script>
</body>
</html>
