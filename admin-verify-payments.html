<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Verify Payments | Nolan University</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F5F5F5; min-height: 100vh; }
        
        /* Login Container */
        .login-container { max-width: 450px; margin: 100px auto; background: white; border-radius: 24px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
        .login-container h1 { color: #0A1C3A; margin-bottom: 8px; }
        .login-container input { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #E0E0E0; border-radius: 12px; font-size: 16px; }
        .login-container button { width: 100%; padding: 14px; background: #0A1C3A; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .login-container button:hover { background: #1A2D4D; }
        .error { color: #DC3545; margin-top: 12px; display: none; }
        
        /* Dashboard Container */
        .dashboard-container { display: none; }
        .header { background: #0A1C3A; color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .header h1 { font-size: 24px; }
        .logout-btn { background: #C5A028; color: #0A1C3A; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 30px 40px; max-width: 1400px; margin: 0 auto; }
        .stat-card { background: white; padding: 24px; border-radius: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-number { font-size: 36px; font-weight: 800; color: #C5A028; }
        .stat-label { color: #666; margin-top: 8px; }
        
        /* Controls */
        .controls { max-width: 1400px; margin: 0 auto 20px; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .search-box input { padding: 12px 16px; width: 300px; border: 1px solid #E0E0E0; border-radius: 12px; font-size: 14px; }
        .filter-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 20px; border: none; border-radius: 50px; cursor: pointer; background: #E0E0E0; font-weight: 500; transition: all 0.3s; }
        .filter-btn.active { background: #0A1C3A; color: white; }
        
        /* Payments List */
        .payments-list { max-width: 1400px; margin: 0 auto; padding: 0 40px 40px; }
        .payment-card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 4px solid #FFC107; transition: all 0.3s; }
        .payment-card.approved { border-left-color: #28A745; }
        .payment-card.rejected { border-left-color: #DC3545; opacity: 0.7; }
        .payment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .reference { font-family: monospace; font-size: 18px; font-weight: 700; color: #0A1C3A; background: #F5F5F5; padding: 4px 12px; border-radius: 8px; }
        .status { padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; }
        .status-pending { background: #FFF3CD; color: #856404; }
        .status-approved { background: #D4EDDA; color: #155724; }
        .status-rejected { background: #F8D7DA; color: #721C24; }
        .payment-details { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin: 16px 0; padding: 16px; background: #F8F9FA; border-radius: 12px; }
        .detail-item { display: flex; flex-direction: column; gap: 4px; }
        .detail-label { font-size: 12px; color: #666; }
        .detail-value { font-weight: 600; color: #333; }
        .proof-image { max-width: 200px; max-height: 150px; border-radius: 8px; cursor: pointer; margin-top: 12px; border: 1px solid #E0E0E0; }
        .actions { display: flex; gap: 12px; margin-top: 16px; }
        .btn-approve { background: #28A745; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-reject { background: #DC3545; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-view { background: #0A1C3A; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .empty-state { text-align: center; padding: 60px; color: #666; background: white; border-radius: 16px; }
        
        /* Modal for proof image */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal img { max-width: 90%; max-height: 90%; border-radius: 8px; }
        .modal-close { position: absolute; top: 20px; right: 40px; color: white; font-size: 40px; cursor: pointer; }
        
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); padding: 20px; }
            .payment-details { grid-template-columns: 1fr; }
            .controls { flex-direction: column; align-items: stretch; }
            .search-box input { width: 100%; }
            .payments-list { padding: 0 20px 20px; }
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-container">
    <i class="fas fa-shield-alt" style="font-size: 48px; color: #C5A028; margin-bottom: 20px;"></i>
    <h1>Admin Login</h1>
    <p style="color: #666; margin-bottom: 24px;">Enter credentials to access payment verification</p>
    <input type="password" id="adminPassword" placeholder="Enter Admin Password">
    <button onclick="login()">Login to Dashboard</button>
    <div id="loginError" class="error">Invalid password. Please try again.</div>
    <p style="margin-top: 20px; font-size: 12px; color: #999;">Default password: <strong>admin123</strong> (Change in production)</p>
</div>

<!-- Dashboard (hidden until login) -->
<div id="dashboardContainer" class="dashboard-container">
    <div class="header">
        <div>
            <h1><i class="fas fa-shield-alt"></i> Payment Verification Dashboard</h1>
            <p style="font-size: 14px; opacity: 0.8; margin-top: 4px;">Review and verify applicant payment proofs</p>
        </div>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
    
    <div class="stats" id="stats">
        <div class="stat-card"><div class="stat-number" id="pendingCount">0</div><div class="stat-label">Pending</div></div>
        <div class="stat-card"><div class="stat-number" id="approvedCount">0</div><div class="stat-label">Approved</div></div>
        <div class="stat-card"><div class="stat-number" id="rejectedCount">0</div><div class="stat-label">Rejected</div></div>
        <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div class="stat-label">Total</div></div>
    </div>
    
    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Search by reference, name, or email...">
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="approved">Approved</button>
            <button class="filter-btn" data-filter="rejected">Rejected</button>
        </div>
    </div>
    
    <div class="payments-list" id="paymentsList"></div>
</div>

<!-- Image Modal -->
<div id="imageModal" class="modal" onclick="closeModal()">
    <span class="modal-close">&times;</span>
    <img id="modalImage" src="">
</div>

<script>
    // ========================================
    // ADMIN CREDENTIALS - CHANGE THESE!
    // ========================================
    const ADMIN_PASSWORD = 'admin123';  // ← CHANGE THIS TO YOUR SECURE PASSWORD
    
    // ========================================
    // LOGIN / LOGOUT FUNCTIONS
    // ========================================
    function login() {
        const password = document.getElementById('adminPassword').value;
        if (password === ADMIN_PASSWORD) {
            localStorage.setItem('adminLoggedIn', 'true');
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardContainer').style.display = 'block';
            loadPayments();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }
    
    function logout() {
        localStorage.removeItem('adminLoggedIn');
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('dashboardContainer').style.display = 'none';
        document.getElementById('adminPassword').value = '';
        document.getElementById('loginError').style.display = 'none';
    }
    
    function checkLoginStatus() {
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardContainer').style.display = 'block';
            loadPayments();
        } else {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('dashboardContainer').style.display = 'none';
        }
    }
    
    // ========================================
    // LOAD PAYMENTS FROM LOCAL STORAGE
    // ========================================
    let allPayments = [];
    let currentFilter = 'all';
    let searchQuery = '';
    
    function loadPayments() {
        const stored = localStorage.getItem('pendingVerifications');
        allPayments = stored ? JSON.parse(stored) : [];
        updateStats();
        renderPayments();
    }
    
    function updateStats() {
        document.getElementById('pendingCount').innerText = allPayments.filter(p => p.status === 'pending').length;
        document.getElementById('approvedCount').innerText = allPayments.filter(p => p.status === 'approved').length;
        document.getElementById('rejectedCount').innerText = allPayments.filter(p => p.status === 'rejected').length;
        document.getElementById('totalCount').innerText = allPayments.length;
    }
    
    function renderPayments() {
        let filtered = allPayments;
        if (currentFilter !== 'all') filtered = filtered.filter(p => p.status === currentFilter);
        if (searchQuery) {
            const query = searchQuery.toLowerCase();
            filtered = filtered.filter(p => 
                p.referenceCode.toLowerCase().includes(query) ||
                p.applicantName.toLowerCase().includes(query) ||
                p.applicantEmail.toLowerCase().includes(query)
            );
        }
        
        const container = document.getElementById('paymentsList');
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 16px;"></i><p>No payment verifications found</p></div>';
            return;
        }
        
        container.innerHTML = filtered.map(payment => `
            <div class="payment-card ${payment.status}">
                <div class="payment-header">
                    <span class="reference"><i class="fas fa-hashtag"></i> ${payment.referenceCode}</span>
                    <span class="status status-${payment.status}">${payment.status.toUpperCase()}</span>
                </div>
                <div class="payment-details">
                    <div class="detail-item"><span class="detail-label">Applicant Name</span><span class="detail-value">${payment.applicantName}</span></div>
                    <div class="detail-item"><span class="detail-label">Email</span><span class="detail-value">${payment.applicantEmail}</span></div>
                    <div class="detail-item"><span class="detail-label">Phone</span><span class="detail-value">${payment.applicantPhone || 'Not provided'}</span></div>
                    <div class="detail-item"><span class="detail-label">Amount</span><span class="detail-value">${payment.currency === 'ZMW' ? 'ZK' : '$'}${payment.amount}</span></div>
                    <div class="detail-item"><span class="detail-label">Payment Method</span><span class="detail-value">${payment.paymentMethod}</span></div>
                    <div class="detail-item"><span class="detail-label">Submitted</span><span class="detail-value">${new Date(payment.timestamp).toLocaleString()}</span></div>
                    ${payment.merchantNumber ? `<div class="detail-item"><span class="detail-label">Merchant Number</span><span class="detail-value">${payment.merchantNumber}</span></div>` : ''}
                </div>
                ${payment.status === 'pending' ? `
                    <div class="actions">
                        <button class="btn-approve" onclick="verifyPayment('${payment.referenceCode}', 'approved')"><i class="fas fa-check"></i> Approve Payment</button>
                        <button class="btn-reject" onclick="verifyPayment('${payment.referenceCode}', 'rejected')"><i class="fas fa-times"></i> Reject Payment</button>
                    </div>
                ` : `
                    <div class="actions">
                        <button class="btn-view" onclick="viewDetails('${payment.referenceCode}')"><i class="fas fa-eye"></i> View Details</button>
                    </div>
                    <div style="margin-top: 12px; font-size: 12px; color: #666;">
                        ${payment.status === 'approved' ? '✓ Verified on ' + new Date(payment.verifiedAt).toLocaleString() : '✗ Rejected on ' + new Date(payment.verifiedAt).toLocaleString()}
                    </div>
                `}
            </div>
        `).join('');
    }
    
    // ========================================
    // VERIFY PAYMENT (APPROVE/REJECT)
    // ========================================
    function verifyPayment(referenceCode, status) {
        const payment = allPayments.find(p => p.referenceCode === referenceCode);
        if (payment) {
            payment.status = status;
            payment.verifiedAt = new Date().toISOString();
            localStorage.setItem('pendingVerifications', JSON.stringify(allPayments));
            localStorage.setItem(`verified_${referenceCode}`, status);
            
            // Simulate sending email to applicant
            console.log(`📧 Email sent to ${payment.applicantEmail}: Your payment has been ${status}`);
            console.log(`Reference: ${referenceCode}`);
            
            updateStats();
            renderPayments();
            
            // Show confirmation alert
            alert(`✅ Payment ${status.toUpperCase()}!\n\nApplicant: ${payment.applicantName}\nEmail: ${payment.applicantEmail}\n\nThey will be notified and their application will be ${status === 'approved' ? 'unlocked' : 'locked'}.`);
            
            // If approved, also mark application fee as paid in localStorage for this applicant
            if (status === 'approved') {
                // Store that this specific reference is approved
                localStorage.setItem(`applicationFeePaid_${referenceCode}`, 'true');
            }
        }
    }
    
    function viewDetails(referenceCode) {
        const payment = allPayments.find(p => p.referenceCode === referenceCode);
        if (payment) {
            alert(`📋 Payment Details\n\nReference: ${payment.referenceCode}\nApplicant: ${payment.applicantName}\nEmail: ${payment.applicantEmail}\nPhone: ${payment.applicantPhone || 'N/A'}\nAmount: ${payment.currency === 'ZMW' ? 'ZK' : '$'}${payment.amount}\nMethod: ${payment.paymentMethod}\nStatus: ${payment.status.toUpperCase()}\nSubmitted: ${new Date(payment.timestamp).toLocaleString()}\nVerified: ${payment.verifiedAt ? new Date(payment.verifiedAt).toLocaleString() : 'Pending'}`);
        }
    }
    
    // ========================================
    // SEARCH AND FILTER
    // ========================================
    document.getElementById('searchInput')?.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderPayments();
    });
    
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderPayments();
        });
    });
    
    function openModal(imageUrl) {
        document.getElementById('modalImage').src = imageUrl;
        document.getElementById('imageModal').classList.add('active');
    }
    
    function closeModal() {
        document.getElementById('imageModal').classList.remove('active');
    }
    
    // ========================================
    // INITIALIZE
    // ========================================
    checkLoginStatus();
</script>
</body>
</html>
