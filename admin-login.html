<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Nolan University</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0A1C3A 0%, #1A2D4D 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 24px; padding: 48px; max-width: 450px; width: 90%; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .logo { width: 80px; height: 80px; background: #0A1C3A; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
        .logo i { font-size: 40px; color: #C5A028; }
        h1 { font-size: 28px; color: #0A1C3A; margin-bottom: 8px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .input-group input { width: 100%; padding: 14px; border: 2px solid #E0E0E0; border-radius: 12px; font-size: 16px; }
        .input-group input:focus { outline: none; border-color: #C5A028; }
        .login-btn { width: 100%; padding: 14px; background: #0A1C3A; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .login-btn:hover { background: #1A2D4D; }
        .error { background: #F8D7DA; color: #721C24; padding: 12px; border-radius: 8px; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><i class="fas fa-shield-alt"></i></div>
        <h1>Admin Login</h1>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="adminEmail" placeholder="admin@nolan.edu">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="adminPassword" placeholder="Enter password">
        </div>
        <button class="login-btn" onclick="login()">Login</button>
        <div id="loginError" class="error">Invalid credentials</div>
    </div>

    <script>
        const ADMIN_CREDENTIALS = {
            email: 'admin@nolan.edu',
            password: 'Admin@2025'
        };
        
        function login() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            
            if (email === ADMIN_CREDENTIALS.email && password === ADMIN_CREDENTIALS.password) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('adminEmail', email);
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('loginError').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('loginError').style.display = 'none';
                }, 3000);
            }
        }
        
        // Check if already logged in
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
