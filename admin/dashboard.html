<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Nolan University</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F5F5F5; }
        .header { background: #0A1C3A; color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .header h1 { font-size: 24px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 30px; max-width: 1400px; margin: 0 auto; }
        .stat-card { background: white; padding: 24px; border-radius: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-number { font-size: 36px; font-weight: 800; color: #C5A028; }
        .stat-label { color: #666; margin-top: 8px; }
        .controls { max-width: 1400px; margin: 0 auto 20px; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .search-box input { padding: 12px 16px; width: 300px; border: 1px solid #E0E0E0; border-radius: 12px; font-size: 14px; }
        .filter-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 20px; border: none; border-radius: 50px; cursor: pointer; background: #E0E0E0; font-weight: 500; transition: all 0.3s; }
        .filter-btn.active { background: #0A1C3A; color: white; }
        .export-btn { background: #28A745; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .payments-list { max-width: 1400px; margin: 0 auto; padding: 0 30px 40px; }
        .payment-card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 4px solid #FFC107; transition: all 0.3s; }
        .payment-card.approved { border-left-color: #28A745; }
        .payment-card.rejected { border-left-color: #DC3545; opacity: 0.8; }
        .payment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .reference { font-family: monospace; font-size: 18px; font-weight: 700; color: #0A1C3A; background: #F5F5F5; padding: 6px 14px; border-radius: 8px; }
        .status { padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; }
        .status-pending { background: #FFF3CD; color: #856404; }
        .status-approved { background: #D4EDDA; color: #155724; }
        .status-rejected { background: #F8D7DA; color: #721C24; }
        .payment-details { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin: 16px 0; padding: 16px; background: #F8F9FA; border-radius: 12px; }
        .detail-item { display: flex; flex-direction: column; gap: 4px; }
        .detail-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .detail-value { font-weight: 600; color: #333; font-size: 14px; }
        .actions { display: flex; gap: 12px; margin-top: 16px; }
        .btn-approve { background: #28A745; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-approve:hover { background: #218838; transform: translateY(-2px); }
        .btn-reject { background: #DC3545; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-reject:hover { background: #C82333; transform: translateY(-2px); }
        .empty-state { text-align: center; padding: 60px; color: #666; background: white; border-radius: 16px; }
        @media (max-width: 768px) { .stats { grid-template-columns: repeat(2, 1fr); padding: 20px; } .payment-details { grid-template-columns: 1fr; } .controls { flex-direction: column; align-items: stretch; padding: 0 20px; } .search-box input { width: 100%; } .payments-list { padding: 0 20px 20px; } }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-shield-alt"></i> Payment Verification Dashboard</h1>
        <div>Nolan University - Central Application System</div>
    </div>
    
    <div class="stats" id="stats">
        <div class="stat-card"><div class="stat-number" id="pendingCount">0</div><div class="stat-label">Pending</div></div>
        <div class="stat-card"><div class="stat-number" id="approvedCount">0</div><div class="stat-label">Approved</div></div>
        <div class="stat-card"><div class="stat-number" id="rejectedCount">0</div><div class="stat-label">Rejected</div></div>
        <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div class="stat-label">Total Applications</div></div>
    </div>
    
    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Search by reference, name, or email...">
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="approved">Approved</button>
            <button class="filter-btn" data-filter="rejected">Rejected</button>
        </div>
        <button class="export-btn" onclick="exportData()"><i class="fas fa-download"></i> Export Report</button>
    </div>
    
    <div class="payments-list" id="paymentsList"></div>

    <script>
        // NO SESSION CHECK - Dashboard is always accessible
        let allPayments = [];
        let currentFilter = 'all';
        let searchQuery = '';
        
        function loadPayments() {
            const stored = localStorage.getItem('pendingVerifications');
            allPayments = stored ? JSON.parse(stored) : [];
            updateStats();
            renderPayments();
        }
        
        function updateStats() {
            const pending = allPayments.filter(p => p.status === 'pending').length;
            const approved = allPayments.filter(p => p.status === 'approved').length;
            const rejected = allPayments.filter(p => p.status === 'rejected').length;
            const total = allPayments.length;
            
            document.getElementById('pendingCount').innerText = pending;
            document.getElementById('approvedCount').innerText = approved;
            document.getElementById('rejectedCount').innerText = rejected;
            document.getElementById('totalCount').innerText = total;
        }
        
        function renderPayments() {
            let filtered = allPayments;
            if (currentFilter !== 'all') filtered = filtered.filter(p => p.status === currentFilter);
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filtered = filtered.filter(p => 
                    p.referenceCode.toLowerCase().includes(query) ||
                    p.applicantName.toLowerCase().includes(query) ||
                    p.applicantEmail.toLowerCase().includes(query)
                );
            }
            
            const container = document.getElementById('paymentsList');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 16px;"></i><p>No payment submissions found</p><p style="font-size: 13px; margin-top: 8px;">When applicants submit proof of payment, they will appear here.</p></div>';
                return;
            }
            
            container.innerHTML = filtered.map(payment => `
                <div class="payment-card ${payment.status}">
                    <div class="payment-header">
                        <span class="reference"><i class="fas fa-hashtag"></i> ${payment.referenceCode}</span>
                        <span class="status status-${payment.status}">${payment.status.toUpperCase()}</span>
                    </div>
                    <div class="payment-details">
                        <div class="detail-item"><span class="detail-label">Applicant Name</span><span class="detail-value">${escapeHtml(payment.applicantName)}</span></div>
                        <div class="detail-item"><span class="detail-label">Email Address</span><span class="detail-value">${escapeHtml(payment.applicantEmail)}</span></div>
                        <div class="detail-item"><span class="detail-label">Phone Number</span><span class="detail-value">${payment.applicantPhone || 'Not provided'}</span></div>
                        <div class="detail-item"><span class="detail-label">Amount</span><span class="detail-value">${payment.currency === 'ZMW' ? 'ZK' : '$'}${payment.amount}</span></div>
                        <div class="detail-item"><span class="detail-label">Payment Method</span><span class="detail-value">${payment.paymentMethod}</span></div>
                        <div class="detail-item"><span class="detail-label">Submitted</span><span class="detail-value">${new Date(payment.timestamp).toLocaleString()}</span></div>
                        ${payment.merchantNumber ? `<div class="detail-item"><span class="detail-label">Merchant Number</span><span class="detail-value">${payment.merchantNumber}</span></div>` : ''}
                        ${payment.verifiedAt ? `<div class="detail-item"><span class="detail-label">Verified</span><span class="detail-value">${new Date(payment.verifiedAt).toLocaleString()}</span></div>` : ''}
                    </div>
                    ${payment.status === 'pending' ? `
                        <div class="actions">
                            <button class="btn-approve" onclick="verifyPayment('${payment.referenceCode}', 'approved')"><i class="fas fa-check"></i> Approve Payment</button>
                            <button class="btn-reject" onclick="verifyPayment('${payment.referenceCode}', 'rejected')"><i class="fas fa-times"></i> Reject Payment</button>
                        </div>
                    ` : `
                        <div class="actions">
                            <button class="btn-approve" onclick="verifyPayment('${payment.referenceCode}', 'approved')" style="background:#17A2B8;"><i class="fas fa-sync"></i> Change to Approved</button>
                            <button class="btn-reject" onclick="verifyPayment('${payment.referenceCode}', 'rejected')"><i class="fas fa-times"></i> Change to Rejected</button>
                        </div>
                        <div style="margin-top: 12px; font-size: 12px; color: #666; padding-top: 8px; border-top: 1px solid #E0E0E0;">
                            ${payment.status === 'approved' ? 
                                `<i class="fas fa-check-circle" style="color: #28A745;"></i> Verified on ${new Date(payment.verifiedAt).toLocaleString()}` : 
                                `<i class="fas fa-times-circle" style="color: #DC3545;"></i> Rejected on ${new Date(payment.verifiedAt).toLocaleString()}`
                            }
                        </div>
                    `}
                </div>
            `).join('');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function verifyPayment(referenceCode, status) {
            const payment = allPayments.find(p => p.referenceCode === referenceCode);
            if (payment) {
                payment.status = status;
                payment.verifiedAt = new Date().toISOString();
                payment.verifiedBy = 'Admin';
                
                localStorage.setItem('pendingVerifications', JSON.stringify(allPayments));
                localStorage.setItem(`verified_${referenceCode}`, status);
                
                if (status === 'approved') {
                    localStorage.setItem(`applicationFeePaid_${referenceCode}`, 'true');
                }
                
                // Show confirmation
                alert(`✅ Payment ${status.toUpperCase()}!\n\nApplicant: ${payment.applicantName}\nReference: ${referenceCode}`);
                
                loadPayments(); // Refresh the list
            }
        }
        
        function exportData() {
            const data = allPayments.map(p => ({
                Reference: p.referenceCode,
                Applicant: p.applicantName,
                Email: p.applicantEmail,
                Phone: p.applicantPhone,
                Amount: `${p.currency === 'ZMW' ? 'ZK' : '$'}${p.amount}`,
                Method: p.paymentMethod,
                Status: p.status,
                Submitted: new Date(p.timestamp).toLocaleString(),
                Verified: p.verifiedAt ? new Date(p.verifiedAt).toLocaleString() : 'Pending'
            }));
            
            const headers = ['Reference', 'Applicant', 'Email', 'Phone', 'Amount', 'Method', 'Status', 'Submitted', 'Verified'];
            const rows = [headers.join(',')];
            data.forEach(item => {
                const values = headers.map(h => `"${(item[h] || '').replace(/"/g, '""')}"`);
                rows.push(values.join(','));
            });
            
            const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `payments_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // Search and filter
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderPayments();
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderPayments();
            });
        });
        
        // Load data on page load
        loadPayments();
        
        // Auto-refresh every 30 seconds
        setInterval(() => {
            loadPayments();
        }, 30000);
        
        console.log('Admin Dashboard loaded - No login required');
    </script>
</body>
</html>
