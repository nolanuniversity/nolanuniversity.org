<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Nolan University</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F5F5F5; }
        .header { background: #0A1C3A; color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { background: #C5A028; color: #0A1C3A; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 30px; max-width: 1400px; margin: 0 auto; }
        .stat-card { background: white; padding: 24px; border-radius: 16px; text-align: center; }
        .stat-number { font-size: 36px; font-weight: 800; color: #C5A028; }
        .controls { max-width: 1400px; margin: 0 auto 20px; padding: 0 30px; display: flex; gap: 16px; flex-wrap: wrap; }
        .search-box input { padding: 12px; width: 300px; border: 1px solid #ccc; border-radius: 8px; }
        .filter-btn { padding: 8px 20px; border: none; border-radius: 50px; cursor: pointer; background: #E0E0E0; }
        .filter-btn.active { background: #0A1C3A; color: white; }
        .payments-list { max-width: 1400px; margin: 0 auto; padding: 0 30px 40px; }
        .payment-card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; border-left: 4px solid #FFC107; }
        .payment-card.approved { border-left-color: #28A745; }
        .payment-card.rejected { border-left-color: #DC3545; }
        .payment-header { display: flex; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; }
        .reference { font-family: monospace; font-size: 18px; font-weight: 700; background: #F5F5F5; padding: 4px 12px; border-radius: 8px; }
        .status { padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; }
        .status-pending { background: #FFF3CD; color: #856404; }
        .payment-details { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin: 16px 0; padding: 16px; background: #F8F9FA; border-radius: 12px; }
        .actions { display: flex; gap: 12px; margin-top: 16px; }
        .btn-approve { background: #28A745; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; }
        .btn-reject { background: #DC3545; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; }
        .empty-state { text-align: center; padding: 60px; background: white; border-radius: 16px; }
        @media (max-width: 768px) { .payment-details { grid-template-columns: 1fr; } .stats { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="header"><h1>Payment Verification Dashboard</h1><button class="logout-btn" onclick="logout()">Logout</button></div>
    <div class="stats"><div class="stat-card"><div class="stat-number" id="pendingCount">0</div><div>Pending</div></div><div class="stat-card"><div class="stat-number" id="approvedCount">0</div><div>Approved</div></div><div class="stat-card"><div class="stat-number" id="rejectedCount">0</div><div>Rejected</div></div><div class="stat-card"><div class="stat-number" id="totalCount">0</div><div>Total</div></div></div>
    <div class="controls"><div class="search-box"><input type="text" id="searchInput" placeholder="Search..."></div><div class="filter-buttons"><button class="filter-btn active" data-filter="all">All</button><button class="filter-btn" data-filter="pending">Pending</button><button class="filter-btn" data-filter="approved">Approved</button><button class="filter-btn" data-filter="rejected">Rejected</button></div></div>
    <div class="payments-list" id="paymentsList"></div>
    <script>
        if (sessionStorage.getItem('adminLoggedIn') !== 'true') { window.location.href = 'index.html'; }
        let allPayments = [], currentFilter = 'all', searchQuery = '';
        function loadPayments() { const stored = localStorage.getItem('pendingVerifications'); allPayments = stored ? JSON.parse(stored) : []; updateStats(); renderPayments(); }
        function updateStats() { document.getElementById('pendingCount').innerText = allPayments.filter(p => p.status === 'pending').length; document.getElementById('approvedCount').innerText = allPayments.filter(p => p.status === 'approved').length; document.getElementById('rejectedCount').innerText = allPayments.filter(p => p.status === 'rejected').length; document.getElementById('totalCount').innerText = allPayments.length; }
        function renderPayments() {
            let filtered = allPayments; if (currentFilter !== 'all') filtered = filtered.filter(p => p.status === currentFilter); if (searchQuery) { const q = searchQuery.toLowerCase(); filtered = filtered.filter(p => p.referenceCode.toLowerCase().includes(q) || p.applicantName.toLowerCase().includes(q) || p.applicantEmail.toLowerCase().includes(q)); }
            const container = document.getElementById('paymentsList');
            if (filtered.length === 0) { container.innerHTML = '<div class="empty-state">No payment submissions found</div>'; return; }
            container.innerHTML = filtered.map(p => `<div class="payment-card ${p.status}"><div class="payment-header"><span class="reference">${p.referenceCode}</span><span class="status status-${p.status}">${p.status.toUpperCase()}</span></div><div class="payment-details"><div><strong>${p.applicantName}</strong></div><div>${p.applicantEmail}</div><div>${p.applicantPhone || 'N/A'}</div><div>${p.currency === 'ZMW' ? 'ZK' : '$'}${p.amount} - ${p.paymentMethod}</div><div>Submitted: ${new Date(p.timestamp).toLocaleString()}</div></div>${p.status === 'pending' ? `<div class="actions"><button class="btn-approve" onclick="verifyPayment('${p.referenceCode}', 'approved')">Approve</button><button class="btn-reject" onclick="verifyPayment('${p.referenceCode}', 'rejected')">Reject</button></div>` : `<div style="margin-top:12px;font-size:12px;">Verified on ${new Date(p.verifiedAt).toLocaleString()}</div>`}</div>`).join('');
        }
        function verifyPayment(ref, status) { const p = allPayments.find(p => p.referenceCode === ref); if (p) { p.status = status; p.verifiedAt = new Date().toISOString(); localStorage.setItem('pendingVerifications', JSON.stringify(allPayments)); localStorage.setItem(`verified_${ref}`, status); if (status === 'approved') localStorage.setItem(`applicationFeePaid_${ref}`, 'true'); alert(`Payment ${status.toUpperCase()}!`); loadPayments(); } }
        document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value; renderPayments(); });
        document.querySelectorAll('.filter-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = btn.dataset.filter; renderPayments(); }); });
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
        loadPayments(); setInterval(loadPayments, 30000);
    </script>
</body>
</html>
