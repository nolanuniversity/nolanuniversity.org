<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamtel Money Payment | Nolan University</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0A1C3A 0%, #1A2D4D 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .payment-container { background: white; border-radius: 24px; padding: 40px; max-width: 500px; width: 100%; text-align: center; }
        .payment-icon i { font-size: 48px; color: #C5A028; margin-bottom: 20px; }
        h1 { font-size: 28px; color: #0A1C3A; }
        .amount { font-size: 36px; font-weight: 800; color: #C5A028; margin: 20px 0; }
        .btn { width: 100%; padding: 16px; background: #C5A028; color: #0A1C3A; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .btn-secondary { background: #0A1C3A; color: white; }
    </style>
</head>
<body>
    <div class="payment-container">
        <div class="payment-icon"><i class="fas fa-mobile-alt"></i></div>
        <h1>Zamtel Money Payment</h1>
        <div class="amount" id="amountDisplay">ZK250</div>
        <p>Send payment to Zamtel Money number: <strong>+260 95 1234567</strong></p>
        <p style="margin: 10px 0;">Reference: <strong id="reference">NU-APP-XXXX</strong></p>
        <button class="btn" id="confirmPaidBtn">✓ I Have Made the Payment</button>
        <button class="btn btn-secondary" id="cancelBtn">← Cancel</button>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const amount = urlParams.get('amount') || '250';
        const currency = urlParams.get('currency') || 'ZMW';
        document.getElementById('amountDisplay').innerText = currency === 'ZMW' ? `ZK${amount}` : `$${amount}`;
        document.getElementById('reference').innerText = `NU-${Math.random().toString(36).substr(2, 8).toUpperCase()}`;
        document.getElementById('confirmPaidBtn').onclick = () => { localStorage.setItem('applicationFeePaid', 'true'); window.location.href = '../index.html?payment=success'; };
        document.getElementById('cancelBtn').onclick = () => { window.location.href = '../index.html'; };
    </script>
</body>
</html>
