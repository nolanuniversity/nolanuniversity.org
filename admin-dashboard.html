<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial; background: #f5f5f5; margin: 0; }
        .header { background: #0A1C3A; color: white; padding: 20px; display: flex; justify-content: space-between; }
        button { background: #C5A028; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; flex: 1; min-width: 120px; }
        .stat-number { font-size: 32px; font-weight: bold; color: #C5A028; }
        .payment-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; border-left: 4px solid #FFC107; }
        .btn-approve { background: #28A745; color: white; border: none; padding: 6px 16px; border-radius: 6px; cursor: pointer; margin-right: 8px; }
        .btn-reject { background: #DC3545; color: white; border: none; padding: 6px 16px; border-radius: 6px; cursor: pointer; }
        .empty { text-align: center; padding: 60px; background: white; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Payment Verification Dashboard</h2>
        <button onclick="logout()">Logout</button>
    </div>
    <div class="container">
        <div class="stats" id="stats">
            <div class="stat-card"><div class="stat-number" id="pendingCount">0</div><div>Pending</div></div>
            <div class="stat-card"><div class="stat-number" id="approvedCount">0</div><div>Approved</div></div>
            <div class="stat-card"><div class="stat-number" id="rejectedCount">0</div><div>Rejected</div></div>
            <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div>Total</div></div>
        </div>
        <div id="paymentsList"></div>
    </div>

    <script>
        // Auth check - redirect to login if not authenticated
        if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }
        
        function loadPayments() {
            const stored = localStorage.getItem('pendingVerifications');
            const payments = stored ? JSON.parse(stored) : [];
            
            const pending = payments.filter(p => p.status === 'pending').length;
            const approved = payments.filter(p => p.status === 'approved').length;
            const rejected = payments.filter(p => p.status === 'rejected').length;
            
            document.getElementById('pendingCount').innerText = pending;
            document.getElementById('approvedCount').innerText = approved;
            document.getElementById('rejectedCount').innerText = rejected;
            document.getElementById('totalCount').innerText = payments.length;
            
            const pendingPayments = payments.filter(p => p.status === 'pending');
            const container = document.getElementById('paymentsList');
            
            if (pendingPayments.length === 0) {
                container.innerHTML = '<div class="empty">No pending payments</div>';
                return;
            }
            
            container.innerHTML = pendingPayments.map(p => `
                <div class="payment-card">
                    <strong>${p.referenceCode}</strong><br>
                    Name: ${p.applicantName}<br>
                    Email: ${p.applicantEmail}<br>
                    Amount: ${p.currency === 'ZMW' ? 'ZK' : '$'}${p.amount}<br>
                    Method: ${p.paymentMethod}<br>
                    Submitted: ${new Date(p.timestamp).toLocaleString()}<br><br>
                    <button class="btn-approve" onclick="verify('${p.referenceCode}', 'approved')">Approve</button>
                    <button class="btn-reject" onclick="verify('${p.referenceCode}', 'rejected')">Reject</button>
                </div>
            `).join('');
        }
        
        function verify(ref, status) {
            const stored = localStorage.getItem('pendingVerifications');
            let payments = stored ? JSON.parse(stored) : [];
            const payment = payments.find(p => p.referenceCode === ref);
            
            if (payment) {
                payment.status = status;
                payment.verifiedAt = new Date().toISOString();
                localStorage.setItem('pendingVerifications', JSON.stringify(payments));
                alert(`Payment ${status.toUpperCase()}!`);
                loadPayments();
            }
        }
        
        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
        
        loadPayments();
        setInterval(loadPayments, 10000);
    </script>
</body>
</html>
