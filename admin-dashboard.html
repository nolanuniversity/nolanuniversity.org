<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Nolan University</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F5F5F5; }
        .header { background: #0A1C3A; color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { background: #C5A028; color: #0A1C3A; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 24px; border-radius: 16px; text-align: center; }
        .stat-number { font-size: 36px; font-weight: 800; color: #C5A028; }
        .payment-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #FFC107; }
        .payment-header { display: flex; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .reference { font-family: monospace; font-size: 16px; font-weight: 700; }
        .status { padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; }
        .status-pending { background: #FFF3CD; color: #856404; }
        .status-approved { background: #D4EDDA; color: #155724; }
        .status-rejected { background: #F8D7DA; color: #721C24; }
        .btn-approve { background: #28A745; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; margin-right: 10px; }
        .btn-reject { background: #DC3545; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        .empty-state { text-align: center; padding: 60px; background: white; border-radius: 16px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-shield-alt"></i> Payment Verification</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <div class="container">
        <div class="stats" id="stats">
            <div class="stat-card"><div class="stat-number" id="pendingCount">0</div><div>Pending</div></div>
            <div class="stat-card"><div class="stat-number" id="approvedCount">0</div><div>Approved</div></div>
            <div class="stat-card"><div class="stat-number" id="rejectedCount">0</div><div>Rejected</div></div>
            <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div>Total</div></div>
        </div>
        <div id="paymentsList"></div>
    </div>

    <script>
        // Simple auth check - NO redirect loop
        const isLoggedIn = sessionStorage.getItem('adminLoggedIn');
        console.log('Auth check:', isLoggedIn);
        
        if (isLoggedIn !== 'true') {
            console.log('Redirecting to login');
            window.location.href = 'index.html';
        }
        
        // Display admin email
        console.log('Admin email:', sessionStorage.getItem('adminEmail'));
        
        let allPayments = [];
        
        function loadPayments() {
            const stored = localStorage.getItem('pendingVerifications');
            allPayments = stored ? JSON.parse(stored) : [];
            updateStats();
            renderPayments();
        }
        
        function updateStats() {
            document.getElementById('pendingCount').innerText = allPayments.filter(p => p.status === 'pending').length;
            document.getElementById('approvedCount').innerText = allPayments.filter(p => p.status === 'approved').length;
            document.getElementById('rejectedCount').innerText = allPayments.filter(p => p.status === 'rejected').length;
            document.getElementById('totalCount').innerText = allPayments.length;
        }
        
        function renderPayments() {
            const container = document.getElementById('paymentsList');
            const pending = allPayments.filter(p => p.status === 'pending');
            
            if (pending.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>No pending payments</p></div>';
                return;
            }
            
            container.innerHTML = pending.map(payment => `
                <div class="payment-card">
                    <div class="payment-header">
                        <span class="reference">${payment.referenceCode}</span>
                        <span class="status status-pending">PENDING</span>
                    </div>
                    <div><strong>${payment.applicantName}</strong> - ${payment.applicantEmail}</div>
                    <div>Amount: ${payment.currency === 'ZMW' ? 'ZK' : '$'}${payment.amount} - ${payment.paymentMethod}</div>
                    <div style="margin-top: 16px;">
                        <button class="btn-approve" onclick="verifyPayment('${payment.referenceCode}', 'approved')">Approve</button>
                        <button class="btn-reject" onclick="verifyPayment('${payment.referenceCode}', 'rejected')">Reject</button>
                    </div>
                </div>
            `).join('');
        }
        
        function verifyPayment(referenceCode, status) {
            const payment = allPayments.find(p => p.referenceCode === referenceCode);
            if (payment) {
                payment.status = status;
                payment.verifiedAt = new Date().toISOString();
                localStorage.setItem('pendingVerifications', JSON.stringify(allPayments));
                localStorage.setItem(`verified_${referenceCode}`, status);
                
                if (status === 'approved') {
                    localStorage.setItem(`applicationFeePaid_${referenceCode}`, 'true');
                }
                
                alert(`Payment ${status.toUpperCase()}! Applicant will be notified.`);
                loadPayments();
            }
        }
        
        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
        
        loadPayments();
        setInterval(loadPayments, 30000);
    </script>
</body>
</html>
